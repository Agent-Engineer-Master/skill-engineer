<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — Custom diagram</title>

<!-- PASTE brand-tokens.md <style> block here -->

<style>
  .svg-frame {
    background: var(--brand-white);
    border: 1px solid var(--brand-rule);
    border-radius: var(--radius-md);
    padding: var(--s-5);
    margin: var(--s-4) 0;
  }
  .svg-frame svg { width: 100%; height: auto; display: block; }

  /* SVG styling — addressable via class names */
  .node-primary  { fill: var(--brand-primary); }
  .node-accent   { fill: var(--brand-accent); }
  .node-tan      { fill: var(--brand-bg-2); }
  .label-on-dark { fill: var(--brand-bg); font-family: var(--font-display); font-size: 14px; font-weight: 500; }
  .label-on-light{ fill: var(--brand-primary); font-family: var(--font-display); font-size: 14px; font-weight: 500; }
  .link          { stroke: var(--brand-text); stroke-width: 2; fill: none; }
  .link--accent  { stroke: var(--brand-accent); stroke-width: 2.5; }
</style>
</head>
<body>
<div class="container">

  <header style="margin-bottom: var(--s-4);">
    <div class="eyebrow">{{EYEBROW}}</div>
    <h1>{{TITLE}}</h1>
    <p>{{CONTEXT}}</p>
  </header>

  <div class="svg-frame">
    <!-- Example: 3-layer architecture diagram. Replace with task-specific SVG. -->
    <svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">

      <!-- Layer 1 — top -->
      <rect class="node-primary" x="60" y="40" width="680" height="80" rx="8"/>
      <text class="label-on-dark" x="400" y="86" text-anchor="middle">{{LAYER_1}}</text>

      <!-- Layer 2 — middle, three boxes -->
      <rect class="node-tan" x="60"  y="160" width="200" height="80" rx="8"/>
      <text class="label-on-light" x="160" y="206" text-anchor="middle">{{L2_A}}</text>

      <rect class="node-tan" x="300" y="160" width="200" height="80" rx="8"/>
      <text class="label-on-light" x="400" y="206" text-anchor="middle">{{L2_B}}</text>

      <rect class="node-tan" x="540" y="160" width="200" height="80" rx="8"/>
      <text class="label-on-light" x="640" y="206" text-anchor="middle">{{L2_C}}</text>

      <!-- Layer 3 — bottom -->
      <rect class="node-accent" x="60" y="280" width="680" height="80" rx="8"/>
      <text class="label-on-light" x="400" y="326" text-anchor="middle">{{LAYER_3}}</text>

      <!-- Connectors -->
      <line class="link" x1="160" y1="120" x2="160" y2="160"/>
      <line class="link" x1="400" y1="120" x2="400" y2="160"/>
      <line class="link" x1="640" y1="120" x2="640" y2="160"/>
      <line class="link" x1="160" y1="240" x2="160" y2="280"/>
      <line class="link" x1="400" y1="240" x2="400" y2="280"/>
      <line class="link" x1="640" y1="240" x2="640" y2="280"/>

    </svg>
  </div>

  <!-- PASTE export-footer.html snippet here -->

</div>
</body>
</html>
