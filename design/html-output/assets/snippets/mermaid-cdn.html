<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'base',
    themeVariables: {
      primaryColor: '#1E3A2F',
      primaryTextColor: '#F4F1EB',
      primaryBorderColor: '#1E3A2F',
      lineColor: '#4A5568',
      secondaryColor: '#E0D8C8',
      tertiaryColor: '#E8A838',
      background: '#F4F1EB',
      fontFamily: 'Inter, system-ui, sans-serif',
      fontSize: '14px'
    },
    flowchart: { curve: 'basis', padding: 16 },
    sequence: { actorMargin: 50, messageMargin: 35 }
  });
</script>
